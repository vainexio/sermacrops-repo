services:
  - type: web
    name: sermacrops-edi
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/sermacrops-edi run build && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
