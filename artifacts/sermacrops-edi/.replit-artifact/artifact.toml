kind = "web"
previewPath = "/"
title = "SERMACROPS EDI Process Flow Manager"
version = "1.0.0"
id = "artifacts/sermacrops-edi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24277

[services.development]
run = "pnpm --filter @workspace/sermacrops-edi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sermacrops-edi", "run", "build" ]
publicDir = "artifacts/sermacrops-edi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24277"
BASE_PATH = "/"
